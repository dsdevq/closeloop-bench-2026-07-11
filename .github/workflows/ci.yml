name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.315'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: bash scripts/verify.sh
